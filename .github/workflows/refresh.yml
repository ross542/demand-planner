name: Refresh Demand Planner

on:
  schedule:
    # 09:30 AEST (UTC+10) = 23:30 UTC previous day
    # Cron in UTC: Sun-Thu 23:30 = Mon-Fri 09:30 AEST
    - cron: "30 23 * * 0-4"
  workflow_dispatch: # allow manual run from the Actions tab

permissions:
  contents: write # needed to push to gh-pages branch

concurrency:
  group: refresh-demand-planner
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run refresh
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          UNLEASHED_API_ID: ${{ secrets.UNLEASHED_API_ID }}
          UNLEASHED_API_KEY: ${{ secrets.UNLEASHED_API_KEY }}
          PMA_SYNC_BASE_URL: ${{ secrets.PMA_SYNC_BASE_URL }}
          PMA_SYNC_API_KEY: ${{ secrets.PMA_SYNC_API_KEY }}
          PMA_SYNC_API_SECRET: ${{ secrets.PMA_SYNC_API_SECRET }}
          PMA_SYNC_USERNAME: ${{ secrets.PMA_SYNC_USERNAME }}
          PMA_SYNC_PASSWORD: ${{ secrets.PMA_SYNC_PASSWORD }}
          YUN_USERNAME: ${{ secrets.YUN_USERNAME }}
          YUN_PASSWORD: ${{ secrets.YUN_PASSWORD }}
        run: node refresh.js

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "refresh ${{ github.run_number }} @ ${{ github.event.schedule || 'manual' }}"

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then echo "No SLACK_WEBHOOK_URL; skipping"; exit 0; fi

          if [ "$JOB_STATUS" = "success" ] && [ -f dist/summary.json ]; then
            EMOJI=":white_check_mark:"
            HEADER="Demand Planner refreshed"
            PRODUCTS=$(jq -r '.productCount' dist/summary.json)
            DUR=$(jq -r '.durationSec' dist/summary.json)
            CRIT=$(jq -r '.statusCounts.CRITICAL // 0' dist/summary.json)
            ORDER=$(jq -r '.statusCounts["ORDER NOW"] // 0' dist/summary.json)
            LOW=$(jq -r '.statusCounts.LOW // 0' dist/summary.json)
            OK=$(jq -r '.statusCounts.OK // 0' dist/summary.json)
            BODY="*${PRODUCTS}* products in ${DUR}s — :red_circle: ${CRIT} CRITICAL · :large_orange_circle: ${ORDER} ORDER NOW · :large_yellow_circle: ${LOW} LOW · :large_green_circle: ${OK} OK"
            DASH="<https://ross542.github.io/demand-planner/|Open dashboard>"
          else
            EMOJI=":x:"
            HEADER="Demand Planner FAILED"
            BODY="Job status: \`${JOB_STATUS}\`"
            DASH="<${RUN_URL}|View run logs>"
          fi

          jq -n --arg emoji "$EMOJI" --arg header "$HEADER" --arg body "$BODY" --arg dash "$DASH" --arg run "$RUN_URL" '{
            text: ($emoji + " " + $header),
            blocks: [
              { type: "header", text: { type: "plain_text", text: ($emoji + " " + $header) } },
              { type: "section", text: { type: "mrkdwn", text: $body } },
              { type: "context", elements: [
                { type: "mrkdwn", text: ($dash + " · <" + $run + "|run #" + env.GITHUB_RUN_NUMBER + ">") }
              ]}
            ]
          }' | curl -sS -X POST -H 'Content-Type: application/json' --data @- "$SLACK_WEBHOOK_URL"
